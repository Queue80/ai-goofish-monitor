name: Build Windows Desktop App

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd web-ui
          npm ci
          npm run build
        shell: bash

      - name: Install Python Dependencies
        run: |
          pip install -r requirements-runtime.txt
          pip install pyinstaller

      - name: Build Backend with PyInstaller
        run: |
          pyinstaller desktop-app/build-backend.spec --distpath desktop-app/pyinstaller-dist
        env:
          PYTHONPATH: .

      - name: Download and Embed Python
        shell: pwsh
        run: |
          # 下载嵌入式 Python 3.11 (Windows x64)
          $pythonUrl = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          $pythonZip = "python-embed.zip"
          $pythonDir = "python-embed"
          $outputDir = "desktop-app\pyinstaller-dist\xianyu-backend"
          
          Write-Host "Downloading Python..."
          Invoke-WebRequest -Uri $pythonUrl -OutFile $pythonZip
          
          Write-Host "Extracting Python..."
          if (Test-Path $pythonDir) { Remove-Item $pythonDir -Recurse -Force }
          Expand-Archive -Path $pythonZip -DestinationPath $pythonDir -Force
          
          # 启用 pip (移除 _pth 文件中的 import site 注释)
          $pthFile = Join-Path $pythonDir "python311._pth"
          if (Test-Path $pthFile) {
            $content = Get-Content $pthFile -Raw
            $content = $content -replace '#import site', 'import site'
            Set-Content -Path $pthFile -Value $content -NoNewline
          }
          
          # 下载 get-pip.py
          $getPipUrl = "https://bootstrap.pypa.io/get-pip.py"
          $getPipFile = "get-pip.py"
          Write-Host "Downloading get-pip.py..."
          Invoke-WebRequest -Uri $getPipUrl -OutFile $getPipFile
          
          # 安装 pip 到嵌入式 Python
          $pythonExe = Join-Path $pythonDir "python.exe"
          Write-Host "Installing pip..."
          & $pythonExe $getPipFile --quiet
          
          # 使用 pip 安装依赖
          Write-Host "Installing dependencies..."
          & $pythonExe -m pip install --upgrade pip --quiet
          & $pythonExe -m pip install -r requirements-runtime.txt --quiet
          
          # 复制 Python 到打包输出目录 (包含安装的包)
          Copy-Item -Path $pythonDir -Destination (Join-Path $outputDir "python") -Recurse -Force
          
          Write-Host "Python embedded with dependencies successfully"
          Write-Host "Output directory contents:"
          Get-ChildItem $outputDir | Format-Table Name

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          xcopy /E /I /Y "C:\Users\runneradmin\AppData\Local\ms-playwright" "desktop-app\playwright-browsers"
        shell: cmd

      - name: Install Desktop App Dependencies
        run: |
          cd desktop-app
          npm install

      - name: Build Windows Installer
        run: |
          cd desktop-app
          npm run build:win

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: xianyu-monitor-windows-installer
          path: desktop-app/release/*.exe
          retention-days: 30
