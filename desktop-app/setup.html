<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>闲鱼智能监控 - 初始配置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin: 24px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }
    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐟 闲鱼智能监控</h1>
    <p class="subtitle">首次使用，请完成以下配置</p>

    <div class="section-title">AI 模型配置（可选，不填则只能用关键词模式）</div>

    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="不填则跳过 AI 分析功能">
      <p class="hint">留空也可以使用，仅关键词匹配模式不需要 AI</p>
    </div>

    <div class="form-group">
      <label>API 接口地址</label>
      <input type="text" id="baseUrl" value="https://api.openai.com/v1/" placeholder="https://api.openai.com/v1/">
      <p class="hint">支持 OpenAI 兼容接口，如硅基流动、ModelScope 等</p>
    </div>

    <div class="form-group">
      <label>模型名称</label>
      <input type="text" id="modelName" value="gpt-4o" placeholder="gpt-4o">
      <p class="hint">需要支持图片分析（Vision）的模型</p>
    </div>

    <div class="section-title">Web 管理界面（可选）</div>

    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" value="admin">
    </div>

    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" value="admin123">
    </div>

    <button class="btn" id="saveBtn" onclick="saveConfig()">保存并启动 🚀</button>
    <button class="btn" id="skipBtn" onclick="skipConfig()" style="background: #95a5a6; margin-top: 8px;">跳过配置，直接启动</button>
    <p class="status" id="status"></p>
  </div>

  <script>
    async function saveConfig() {
      const btn = document.getElementById('saveBtn')
      const status = document.getElementById('status')
      const apiKey = document.getElementById('apiKey').value.trim()
      const baseUrl = document.getElementById('baseUrl').value.trim()
      const modelName = document.getElementById('modelName').value.trim()
      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value.trim()

      if (!apiKey) {
        // API Key 为空时也允许启动，只是不能用 AI 模式
      }
      if (apiKey && (!baseUrl || !modelName)) {
        status.textContent = '⚠️ 填了 API Key 就需要填完接口地址和模型名称'
        status.style.color = '#e74c3c'
        return
      }

      btn.disabled = true
      status.textContent = '正在保存配置...'
      status.style.color = '#666'

      try {
        await window.electronAPI.saveConfig({ apiKey, baseUrl, modelName, username, password })
        status.textContent = '✅ 配置已保存，正在启动...'
        status.style.color = '#27ae60'
        setTimeout(async () => {
          await window.electronAPI.startApp()
        }, 1000)
      } catch (e) {
        status.textContent = '❌ 保存失败: ' + e.message
        status.style.color = '#e74c3c'
        btn.disabled = false
      }
    }

    async function skipConfig() {
      const status = document.getElementById('status')
      status.textContent = '正在启动（未配置 AI，仅支持关键词模式）...'
      status.style.color = '#666'
      try {
        await window.electronAPI.saveConfig({
          apiKey: '',
          baseUrl: '',
          modelName: '',
          username: 'admin',
          password: 'admin123'
        })
        setTimeout(async () => {
          await window.electronAPI.startApp()
        }, 1000)
      } catch (e) {
        status.textContent = '❌ 启动失败: ' + e.message
        status.style.color = '#e74c3c'
      }
    }
  </script>
</body>
</html>
